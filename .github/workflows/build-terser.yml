name: Build Terser Standalone Binaries

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: win-x64
            pkg_target: node18-win-x64
            output: terser.exe
          - target: linux-x64
            pkg_target: node18-linux-x64
            output: terser
          - target: macos-x64
            pkg_target: node18-macos-x64
            output: terser-macos
          - target: macos-arm64
            pkg_target: node18-macos-arm64
            output: terser-macos-arm64

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pkg and terser locally
        run: |
          npm init -y
          npm install pkg terser

      - name: Package with pkg
        run: |
          npx pkg node_modules/terser/bin/terser \
            --targets ${{ matrix.pkg_target }} \
            --output ${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terser-${{ matrix.target }}
          path: ${{ matrix.output }}
