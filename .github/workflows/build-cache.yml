name: Download and Export Docker Image as Tarball

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: "Docker Image Name (e.g., library/ubuntu or ghcr.io/user/repo/image)"
        required: true
        default: "ubuntu"
        type: string
      tag:
        description: "Image tag"
        required: true
        default: "latest"
        type: string
      docker_username:
        description: "Docker Registry Username (if private image)"
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Registry
        if: github.event.inputs.docker_username != ''
        uses: docker/login-action@v3
        with:
          username: ${{ github.event.inputs.docker_username }}
          password: ${{ secrets.DOCKER_PASSWORD }} 

      - name: Pull and Save Docker Image
        id: save_image
        run: |
          IMAGE_REF="${{ github.event.inputs.image_name }}:${{ github.event.inputs.tag }}"
          
          SAFE_NAME=$(echo "$IMAGE_REF" | sed 's/[^a-zA-Z0-9_.-]/_/g')
          FILE_NAME="$SAFE_NAME.tar"
          
          echo "Pulling $IMAGE_REF..."
          docker pull $IMAGE_REF
          
          echo "Saving $IMAGE_REF to $FILE_NAME..."
          docker save -o $FILE_NAME $IMAGE_REF
          
          echo "DOCKER_TAR_FILE=$FILE_NAME" >> "$GITHUB_OUTPUT"
          echo "SAFE_ARTIFACT_NAME=$SAFE_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload Docker Image Tarball
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.save_image.outputs.SAFE_ARTIFACT_NAME }} 
          path: ${{ steps.save_image.outputs.DOCKER_TAR_FILE }}
          retention-days: 1
